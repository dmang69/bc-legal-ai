name: Platform UI tests

on:
  push:
    paths:
      - "apps/platform-ui/**"
      - "docs/SECTION_G_PLATFORM_AND_DISTRIBUTION.md"
  pull_request:
    paths:
      - "apps/platform-ui/**"

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/platform-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/platform-ui/package.json
      - run: npm install
      - run: npm run typecheck
