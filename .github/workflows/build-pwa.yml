name: Build PWA (platform-ui)

on:
  push:
    paths:
      - "apps/platform-ui/**"
      - ".github/workflows/build-pwa.yml"
  pull_request:
    paths:
      - "apps/platform-ui/**"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/platform-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/platform-ui/package.json
      - run: npm install
      - run: npm run build
        env:
          VITE_API_BASE_URL: http://127.0.0.1:8000
          VITE_APP_MODE: portal
