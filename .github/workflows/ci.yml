name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install pytest fastapi "uvicorn[standard]" pydantic httpx
      - name: Confidential scan
        run: python scripts/scan_confidential.py
      - name: Unit tests
        run: python -m pytest tests/ -q --tb=line
        env:
          PYTHONPATH: .

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Docker build
        run: docker build -t bc-legal-ai:ci .
