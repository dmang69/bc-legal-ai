# Skeleton — image not published. Wire when container image exists.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ala-api
  namespace: ala
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ala-api
  template:
    metadata:
      labels:
        app: ala-api
    spec:
      containers:
        - name: api
          image: ghcr.io/dmang69/bc-legal-ai-api:not-built
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: ala-runtime
                optional: true
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: ala-api
  namespace: ala
spec:
  selector:
    app: ala-api
  ports:
    - port: 80
      targetPort: 8000
