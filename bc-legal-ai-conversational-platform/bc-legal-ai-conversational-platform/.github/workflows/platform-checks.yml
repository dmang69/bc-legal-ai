name: Platform checks

on:
  pull_request:
    paths:
      - "apps/platform-ui/**"
      - "apps/desktop-mobile/**"
      - ".github/workflows/platform-checks.yml"
  push:
    branches: [main, master]
    paths:
      - "apps/platform-ui/**"
      - "apps/desktop-mobile/**"

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/platform-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/platform-ui/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
